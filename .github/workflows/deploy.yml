name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: false
      - uses: actions/setup-node@v4
        with:
          registry-url: https://npm.pkg.github.com
          scope: "@void-sdk"
      - run: vp install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
      - run: vp check
      - run: vp test --run
      - run: vp build
      - run: vp exec void deploy --project source-map-viewer --skip-build
        env:
          VOID_TOKEN: ${{ secrets.VOID_TOKEN }}
