name: PR

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: false
      - uses: actions/setup-node@v4
        with:
          registry-url: https://npm.pkg.github.com
          scope: "@void-sdk"
      - run: vp install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
      - run: vp check
      - run: vp test --run
      # Build + smoke-test the CLI so a broken `bin.js` is caught at PR time.
      - run: vp run --filter source-map-viewer build
      - run: node packages/cli/bin.js --help > /dev/null
