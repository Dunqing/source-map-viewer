name: Publish CLI
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@void-sdk"
      - run: vp install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
      - run: vp run --filter source-map-viewer build
      # Smoke-test the built artifact via the actual `bin` entry. Catches
      # mismatches between bin.js's import path and the real dist filename
      # (e.g. `cli.js` vs `cli.mjs`) before publishing.
      - run: node packages/cli/bin.js --help > /dev/null
      # Switch registry to npmjs for publish via npm trusted publishing (OIDC).
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: vp pm publish --filter source-map-viewer --no-git-checks -- --provenance
